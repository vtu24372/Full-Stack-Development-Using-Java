<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Job Seeker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-briefcase"></i> JobPortal</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="/jobseeker/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="active"><a href="/jobseeker/profile"><i class="fas fa-user"></i> My Profile</a></li>
                <li><a href="/jobseeker/jobs"><i class="fas fa-search"></i> Browse Jobs</a></li>
                <li><a href="/jobseeker/applications"><i class="fas fa-file-alt"></i> My Applications</a></li>
                <li><a href="/jobseeker/notifications"><i class="fas fa-bell"></i> Notifications</a></li>
                <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-header">
                <div class="welcome">
                    <h1>My Profile</h1>
                    <p>Manage your personal information and resume</p>
                </div>
            </div>

            <div class="profile-container">
                <!-- Profile Picture Section -->
                <div class="profile-picture-section">
                    <div class="profile-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <button class="change-photo-btn"><i class="fas fa-camera"></i> Change Photo</button>
                </div>

                <!-- Profile Form -->
                <form action="/jobseeker/update-profile" method="post" enctype="multipart/form-data" class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name *</label>
                            <input type="text" name="name" th:value="${user.name}" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email Address *</label>
                            <input type="email" name="email" th:value="${user.email}" readonly>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone Number</label>
                            <input type="tel" name="phone" th:value="${user.phone}" placeholder="Enter your phone number">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-map-marker-alt"></i> Location</label>
                            <input type="text" name="location" th:value="${user.location}" placeholder="City, State">
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-code"></i> Skills *</label>
                        <input type="text" name="skills" th:value="${user.skills}" placeholder="e.g., Java, Python, React, MySQL" required>
                        <small>Separate skills with commas</small>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-file-alt"></i> Resume/CV</label>
                        <div class="resume-upload">
                            <input type="file" name="resume" accept=".pdf,.doc,.docx" id="resumeInput">
                            <label for="resumeInput" class="upload-label">
                                <i class="fas fa-cloud-upload-alt"></i> Upload Resume (PDF, DOC, DOCX)
                            </label>
                            <div th:if="${user.resumePath}" class="current-resume">
                                <i class="fas fa-file-pdf"></i>
                                <a th:href="${user.resumePath}" target="_blank">View Current Resume</a>
                            </div>
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                        <button type="reset" class="btn-secondary"><i class="fas fa-undo"></i> Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
