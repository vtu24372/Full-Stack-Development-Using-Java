<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Job Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2><i class="fas fa-briefcase"></i> JobPortal</h2>
            </div>
            <ul class="nav-menu">
                <li class="active"><a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="/admin/users"><i class="fas fa-users"></i> Manage Users</a></li>
                <li><a href="/admin/reports"><i class="fas fa-chart-bar"></i> Reports</a></li>
                <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-header">
                <div class="welcome">
                    <h1>Admin Dashboard</h1>
                    <p>Welcome back, Admin!</p>
                </div>
                <div class="date-time">
                    <i class="fas fa-calendar"></i>
                    <span id="currentDate"></span>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3 th:text="${totalUsers}">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="stat-info">
                        <h3 th:text="${totalJobSeekers}">0</h3>
                        <p>Job Seekers</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon yellow">
                        <i class="fas fa-building"></i>
                    </div>
                    <div class="stat-info">
                        <h3 th:text="${totalEmployers}">0</h3>
                        <p>Employers</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <div class="stat-info">
                        <h3 th:text="${totalJobs}">0</h3>
                        <p>Total Jobs</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div class="stat-info">
                        <h3 th:text="${totalApplications}">0</h3>
                        <p>Applications</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon yellow">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <h3 th:text="${pendingApplications}">0</h3>
                        <p>Pending Reviews</p>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="recent-section">
                <div class="section-header">
                    <h2><i class="fas fa-chart-line"></i> Platform Overview</h2>
                </div>
                <div class="activity-grid">
                    <div class="activity-card">
                        <h3>User Growth</h3>
                        <canvas id="userChart" width="400" height="200"></canvas>
                    </div>
                    <div class="activity-card">
                        <h3>Job Statistics</h3>
                        <canvas id="jobChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const date = new Date();
        document.getElementById('currentDate').innerHTML = date.toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });

        const ctx1 = document.getElementById('userChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'New Users',
                    data: [12, 19, 15, 25, 22, 30],
                    borderColor: '#FF6B35',
                    backgroundColor: 'rgba(255, 107, 53, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#fff' } }
                }
            }
        });

        const ctx2 = document.getElementById('jobChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['IT', 'Marketing', 'Sales', 'Finance', 'HR'],
                datasets: [{
                    label: 'Jobs by Category',
                    data: [45, 28, 32, 25, 18],
                    backgroundColor: '#00D4FF',
                    borderRadius: 10
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#fff' } }
                }
            }
        });
    </script>
</body>
</html>
