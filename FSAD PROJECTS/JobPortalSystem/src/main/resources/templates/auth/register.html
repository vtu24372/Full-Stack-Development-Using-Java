<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Job Portal System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card register-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-briefcase"></i>
                </div>
                <h1>Create Account</h1>
                <p>Join JobPortal to find your dream job or hire talent</p>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Error message</span>
            </div>

            <form action="/auth/save-user" method="post" class="auth-form" onsubmit="return validateForm()">
                <div class="form-row">
                    <div class="input-group full-width">
                        <i class="fas fa-user"></i>
                        <input type="text" name="name" placeholder="Full Name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group full-width">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="Email Address" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group half">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                    </div>
                    <div class="input-group half">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group half">
                        <i class="fas fa-phone"></i>
                        <input type="tel" name="phone" placeholder="Phone Number">
                    </div>
                    <div class="input-group half">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" name="location" placeholder="Location">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group full-width">
                        <i class="fas fa-user-tag"></i>
                        <select name="role" required>
                            <option value="">Select Account Type</option>
                            <option value="JOBSEEKER">Job Seeker - Looking for job</option>
                            <option value="EMPLOYER">Employer - Hiring candidates</option>
                        </select>
                    </div>
                </div>

                <div class="form-row employer-fields" style="display: none;">
                    <div class="input-group full-width">
                        <i class="fas fa-building"></i>
                        <input type="text" name="companyName" placeholder="Company Name">
                    </div>
                </div>

                <div class="form-row jobseeker-fields" style="display: none;">
                    <div class="input-group full-width">
                        <i class="fas fa-code"></i>
                        <input type="text" name="skills" placeholder="Skills (e.g., Java, Python, React)">
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        <span>I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/auth/login">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        // Show/hide fields based on role selection
        document.querySelector('select[name="role"]').addEventListener('change', function() {
            const employerFields = document.querySelector('.employer-fields');
            const jobseekerFields = document.querySelector('.jobseeker-fields');
            
            if (this.value === 'EMPLOYER') {
                employerFields.style.display = 'flex';
                jobseekerFields.style.display = 'none';
            } else if (this.value === 'JOBSEEKER') {
                employerFields.style.display = 'none';
                jobseekerFields.style.display = 'flex';
            } else {
                employerFields.style.display = 'none';
                jobseekerFields.style.display = 'none';
            }
        });

        // Form validation
        function validateForm() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return false;
            }
            
            if (password.length < 6) {
                alert('Password must be at least 6 characters long!');
                return false;
            }
            
            return true;
        }
    </script>
</body>
</html>
