<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Events • EventHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        /* Modal Content */
        .modal-content {
            background: #0f1117;
            border: 1px solid #2a2f3a;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Modal Header */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #2a2f3a;
            position: sticky;
            top: 0;
            background: #0f1117;
            z-index: 1;
        }

        .modal-header h2 {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .close-btn {
            background: #1a1e26;
            border: 1px solid #2a2f3a;
            color: #9aa4bf;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #f05252;
            color: white;
            border-color: #f05252;
        }

        /* Modal Body */
        .modal-body {
            padding: 25px;
        }

        /* Filter Group */
        .filter-group {
            margin-bottom: 30px;
        }

        .filter-group h3 {
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9aa4bf;
        }

        /* Radio Labels */
        .radio-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #9aa4bf;
            margin-bottom: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .radio-label:hover {
            color: #4285f4;
        }

        .radio-label input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #4285f4;
            cursor: pointer;
        }

        /* Price Inputs */
        .price-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .price-inputs input {
            flex: 1;
            padding: 12px;
            background: #0a0c10;
            border: 1px solid #2a2f3a;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
        }

        .price-inputs input:focus {
            outline: none;
            border-color: #4285f4;
        }

        .price-inputs span {
            color: #9aa4bf;
        }

        /* Price Presets */
        .price-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .price-preset {
            background: #1a1e26;
            border: 1px solid #2a2f3a;
            color: #9aa4bf;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .price-preset:hover {
            border-color: #4285f4;
            color: #4285f4;
            background: rgba(66, 133, 244, 0.1);
        }

        /* Date Options */
        .date-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .date-option {
            background: #1a1e26;
            border: 1px solid #2a2f3a;
            color: #9aa4bf;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .date-option:hover {
            border-color: #4285f4;
            color: #4285f4;
        }

        .date-option.active {
            background: #4285f4;
            color: white;
            border-color: #4285f4;
        }

        /* Checkbox Labels */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #9aa4bf;
            margin-bottom: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .checkbox-label:hover {
            color: #4285f4;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4285f4;
            cursor: pointer;
        }

        /* Toggle Label */
        .toggle-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #9aa4bf;
            cursor: pointer;
            padding: 5px 0;
        }

        .toggle-label:hover {
            color: #4285f4;
        }

        .toggle {
            width: 50px;
            height: 24px;
            cursor: pointer;
            accent-color: #4285f4;
        }

        /* Modal Footer */
        .modal-footer {
            display: flex;
            gap: 15px;
            padding: 20px 25px;
            border-top: 1px solid #2a2f3a;
            background: #0f1117;
            position: sticky;
            bottom: 0;
        }

        .modal-footer button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary {
            background: #1a1e26;
            border: 1px solid #2a2f3a;
            color: #9aa4bf;
        }

        .btn-secondary:hover {
            border-color: #4285f4;
            color: #4285f4;
            background: rgba(66, 133, 244, 0.1);
        }

        .btn-primary {
            background: #4285f4;
            border: none;
            color: white;
        }

        .btn-primary:hover {
            background: #5a95f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.3);
        }

        /* Scrollbar Styling */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: #1a1e26;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: #2a2f3a;
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: #4285f4;
        }
    </style>
</head>
<body>
    <div class="modal-overlay">
        <div class="modal-content">
            <!-- Modal Header -->
            <div class="modal-header">
                <h2>Filter Events</h2>
                <button class="close-btn" onclick="window.history.back()">&times;</button>
            </div>

            <!-- Modal Body -->
            <div class="modal-body">
                <!-- Sort By -->
                <div class="filter-group">
                    <h3>Sort By</h3>
                    <label class="radio-label">
                        <input type="radio" name="sort" value="popularity" checked> Popularity
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="sort" value="price-low"> Price: Low to High
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="sort" value="price-high"> Price: High to Low
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="sort" value="date"> Date (Earliest)
                    </label>
                </div>

                <!-- Price Range -->
                <div class="filter-group">
                    <h3>Price Range</h3>
                    <div class="price-inputs">
                        <input type="number" placeholder="Min" class="price-input" value="0">
                        <span>to</span>
                        <input type="number" placeholder="Max" class="price-input" value="10000">
                    </div>
                    <div class="price-presets">
                        <button class="price-preset">Under ₹500</button>
                        <button class="price-preset">₹500 - ₹1000</button>
                        <button class="price-preset">₹1000 - ₹2000</button>
                        <button class="price-preset">₹2000+</button>
                    </div>
                </div>

                <!-- Date -->
                <div class="filter-group">
                    <h3>Date</h3>
                    <div class="date-options">
                        <button class="date-option active">Today</button>
                        <button class="date-option">Tomorrow</button>
                        <button class="date-option">This Weekend</button>
                        <button class="date-option">Next Week</button>
                    </div>
                </div>

                <!-- Category -->
                <div class="filter-group">
                    <h3>Category</h3>
                    <label class="checkbox-label">
                        <input type="checkbox" value="music"> Music
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="comedy"> Comedy
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="sports"> Sports
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" value="performances"> Performances
                    </label>
                </div>

                <!-- Free Events Only -->
                <div class="filter-group">
                    <label class="toggle-label">
                        <span>Free events only</span>
                        <input type="checkbox" class="toggle">
                    </label>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="modal-footer">
                <button class="btn-secondary" onclick="window.history.back()">Cancel</button>
                <button class="btn-primary" onclick="window.location.href='/events'">Apply Filters</button>
            </div>
        </div>
    </div>

    <script>
        // Price presets functionality
        document.querySelectorAll('.price-preset').forEach(btn => {
            btn.addEventListener('click', function() {
                const minInput = document.querySelector('.price-input:first-child');
                const maxInput = document.querySelector('.price-input:last-child');
                
                if (this.textContent.includes('Under')) {
                    minInput.value = 0;
                    maxInput.value = this.textContent.replace('Under ₹', '');
                } else if (this.textContent.includes('+')) {
                    minInput.value = this.textContent.replace('₹', '').replace('+', '');
                    maxInput.value = 100000;
                } else if (this.textContent.includes('-')) {
                    const range = this.textContent.replace('₹', '').split(' - ');
                    minInput.value = range[0];
                    maxInput.value = range[1];
                }
            });
        });
        
        // Date options active state
        document.querySelectorAll('.date-option').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.date-option').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.history.back();
            }
        });
    </script>
</body>
</html>
