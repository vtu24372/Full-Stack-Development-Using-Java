# ====================================
# SERVER CONFIGURATION
# ====================================
server.port=8080

# ====================================
# DATABASE CONFIGURATION (MySQL)
# ====================================
spring.datasource.url=jdbc:mysql://localhost:3306/eventhub_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=vtu24372_vick@6306
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====================================
# JPA / HIBERNATE CONFIGURATION (FIXED)
# ====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ====================================
# THYMELEAF TEMPLATES (HTML PAGES)
# ====================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ====================================
# STATIC RESOURCES (CSS, JS, IMAGES)
# ====================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ====================================
# LOGGING (Optional - for debugging)
# ====================================
logging.level.org.springframework.web=INFO
logging.level.com.eventhub=DEBUG
logging.level.org.hibernate.SQL=DEBUG