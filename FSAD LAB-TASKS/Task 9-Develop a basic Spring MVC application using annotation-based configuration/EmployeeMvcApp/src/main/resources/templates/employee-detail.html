<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e2b3a 0%, #2c3e50 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(44, 62, 80, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h2 {
            color: #3498db;
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
            display: inline-block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            background: rgba(52, 73, 94, 0.5);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.5rem;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        
        .employee-name {
            font-size: 2rem;
            color: white;
            font-weight: 600;
        }
        
        .employee-title {
            color: #3498db;
            font-size: 1.1rem;
            margin-top: 0.3rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .info-card {
            background: rgba(52, 73, 94, 0.3);
            border-radius: 12px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        
        .info-card:hover {
            transform: translateY(-3px);
            background: rgba(52, 73, 94, 0.5);
            border-color: #3498db;
        }
        
        .info-label {
            font-size: 0.85rem;
            color: #bdc3c7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .info-value {
            font-size: 1.2rem;
            color: white;
            font-weight: 500;
            word-break: break-all;
        }
        
        .back-btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 1rem;
        }
        
        .back-btn:hover {
            background: linear-gradient(135deg, #2980b9, #3498db);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            color: white;
            text-decoration: none;
        }
        
        .back-btn i {
            margin-right: 0.5rem;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .avatar {
                margin-right: 0;
                margin-bottom: 1rem;
            }
            
            h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 Employee Profile</h2>
        
        <div class="profile-header">
            <div class="avatar" th:text="${#strings.substring(employee.firstName, 0, 1) + #strings.substring(employee.lastName, 0, 1)}">
                JD
            </div>
            <div>
                <div class="employee-name" th:text="${employee.firstName + ' ' + employee.lastName}">
                    John Doe
                </div>
                <div class="employee-title" th:text="${employee.department}">
                    IT Department
                </div>
            </div>
        </div>
        
        <div class="info-grid">
            <div class="info-card">
                <div class="info-label">📧 Email Address</div>
                <div class="info-value" th:text="${employee.email}">john.doe@company.com</div>
            </div>
            
            <div class="info-card">
                <div class="info-label">📱 Phone Number</div>
                <div class="info-value" th:text="${employee.phone}">+1-555-0123</div>
            </div>
            
            <div class="info-card">
                <div class="info-label">🆔 Employee ID</div>
                <div class="info-value" th:text="'EMP-' + ${employee.id}">EMP-001</div>
            </div>
            
            <div class="info-card">
                <div class="info-label">📅 Join Date</div>
                <div class="info-value" th:text="${employee.joinDate}">2023-01-15</div>
            </div>
            
            <div class="info-card">
                <div class="info-label">🏢 Department</div>
                <div class="info-value" th:text="${employee.department}">IT</div>
            </div>
            
            <div class="info-card">
                <div class="info-label">📋 Full Name</div>
                <div class="info-value" th:text="${employee.firstName + ' ' + employee.lastName}">
                    John Doe
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 1rem;">
            <a href="/employees" class="back-btn">← Back to Employee List</a>
        </div>
    </div>
</body>
</html>
