<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e2b3a 0%, #2c3e50 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(44, 62, 80, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h2 {
            color: #3498db;
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 0.5rem;
            display: inline-block;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            border-radius: 10px;
            overflow: hidden;
        }
        
        thead {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        
        th {
            padding: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }
        
        tbody tr {
            background: rgba(52, 73, 94, 0.8);
            transition: all 0.3s ease;
        }
        
        tbody tr:hover {
            background: rgba(52, 73, 94, 0.95);
            transform: scale(1.01);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ecf0f1;
        }
        
        .btn-view {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .btn-view:hover {
            background: linear-gradient(135deg, #2980b9, #3498db);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
            text-decoration: none;
            color: white;
        }
        
        .department-badge {
            background: rgba(52, 152, 219, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid #3498db;
            color: #3498db;
            display: inline-block;
        }
        
        .stats-card {
            background: rgba(52, 73, 94, 0.5);
            border-radius: 10px;
            padding: 1rem;
            margin-top: 2rem;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #3498db;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #bdc3c7;
            text-transform: uppercase;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            h2 {
                font-size: 1.8rem;
            }
            
            th, td {
                padding: 0.75rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌟 Employee Management System</h2>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Phone</th>
                        <th>Join Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${employees}">
                        <td><strong>#[[${emp.id}]]</strong></td>
                        <td th:text="${emp.firstName}">John</td>
                        <td th:text="${emp.lastName}">Doe</td>
                        <td th:text="${emp.email}">john@email.com</td>
                        <td>
                            <span class="department-badge" th:text="${emp.department}">IT</span>
                        </td>
                        <td th:text="${emp.phone}">+1-555-0123</td>
                        <td th:text="${emp.joinDate}">2023-01-15</td>
                        <td>
                            <a th:href="@{/employees/{id}(id=${emp.id})}" 
                               class="btn-view">👁️ View Details</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="stats-card">
            <div class="stat-item">
                <div class="stat-value" th:text="${#lists.size(employees)}">6</div>
                <div class="stat-label">Total Employees</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">4</div>
                <div class="stat-label">Departments</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">2023</div>
                <div class="stat-label">All Joined in</div>
            </div>
        </div>
    </div>
</body>
</html>
