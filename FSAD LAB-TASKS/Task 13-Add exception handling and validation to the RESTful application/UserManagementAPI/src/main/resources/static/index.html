<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #1a2632 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(30, 35, 40, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .header {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: white;
        }
        
        .header p {
            color: rgba(255,255,255,0.9);
        }
        
        .nav {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .nav-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: #d35400;
            transform: translateY(-2px);
        }
        
        .content {
            padding: 30px;
        }
        
        .form-section {
            background: rgba(40, 45, 50, 0.8);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #e67e22;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e67e22;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #2a2f35;
            border: 1px solid #e67e22;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 10px rgba(230,126,34,0.3);
        }
        
        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #d35400;
            transform: translateY(-2px);
        }
        
        .users-list {
            background: rgba(40, 45, 50, 0.8);
            border-radius: 10px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e67e22;
        }
        
        th {
            background: #e67e22;
            color: white;
        }
        
        tr:hover {
            background: rgba(230,126,34,0.1);
        }
        
        .action-btn {
            padding: 5px 10px;
            margin: 0 5px;
            font-size: 12px;
        }
        
        .delete-btn {
            background: #e74c3c;
        }
        
        .delete-btn:hover {
            background: #c0392b;
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: #27ae60;
            color: white;
        }
        
        .alert-error {
            background: #e74c3c;
            color: white;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
            }
            
            th, td {
                padding: 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 User Management System</h1>
            <p>Create, Read, Update, and Delete Users with Validation</p>
        </div>
        
        <div class="nav">
            <button class="nav-btn" onclick="showAddUser()">➕ Add New User</button>
            <button class="nav-btn" onclick="loadUsers()">🔄 Refresh Users</button>
        </div>
        
        <div class="content">
            <div id="alert" class="alert"></div>
            
            <div id="addUserForm" class="form-section" style="display: none;">
                <h2>Add New User</h2>
                <form id="userForm">
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" id="name" required minlength="2" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Age:</label>
                        <input type="number" id="age" required min="18" max="120">
                    </div>
                    <div class="form-group">
                        <label>Phone:</label>
                        <input type="tel" id="phone" pattern="\d{10}" placeholder="10 digits">
                    </div>
                    <div class="form-group">
                        <label>Address:</label>
                        <textarea id="address" rows="3" required></textarea>
                    </div>
                    <button type="submit">Create User</button>
                    <button type="button" onclick="hideAddUser()" style="background: #7f8c8d;">Cancel</button>
                </form>
            </div>
            
            <div class="users-list">
                <h2>📋 User List</h2>
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center;">Loading users...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'http://localhost:8080/api/users';
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }
        
        function showAddUser() {
            document.getElementById('addUserForm').style.display = 'block';
        }
        
        function hideAddUser() {
            document.getElementById('addUserForm').style.display = 'none';
            document.getElementById('userForm').reset();
        }
        
        async function loadUsers() {
            try {
                const response = await fetch(API_BASE_URL);
                if (!response.ok) throw new Error('Failed to load users');
                const users = await response.json();
                displayUsers(users);
            } catch (error) {
                showAlert('Error loading users: ' + error.message, 'error');
            }
        }
        
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No users found</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.name)}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>${user.age}</td>
                    <td>${user.phone || 'N/A'}</td>
                    <td>${escapeHtml(user.address)}</td>
                    <td>
                        <button class="action-btn delete-btn" onclick="deleteUser(${user.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: parseInt(document.getElementById('age').value),
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            
            try {
                const response = await fetch(API_BASE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(user)
                });
                
                if (response.status === 201) {
                    const createdUser = await response.json();
                    showAlert(`User ${createdUser.name} created successfully!`, 'success');
                    hideAddUser();
                    loadUsers();
                } else {
                    const error = await response.json();
                    showAlert(`Error: ${JSON.stringify(error)}`, 'error');
                }
            } catch (error) {
                showAlert('Error creating user: ' + error.message, 'error');
            }
        });
        
        async function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.status === 204) {
                        showAlert('User deleted successfully!', 'success');
                        loadUsers();
                    } else {
                        showAlert('Error deleting user', 'error');
                    }
                } catch (error) {
                    showAlert('Error deleting user: ' + error.message, 'error');
                }
            }
        }
        
        // Load users on page load
        loadUsers();
    </script>
</body>
</html>
