<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Management - Microservices</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e2f 0%, #1e2a1f 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(46, 64, 43, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #ffd966;
            margin-bottom: 10px;
        }
        
        .nav-bar {
            background: rgba(34, 49, 32, 0.95);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
        }
        
        .nav-btn {
            background: linear-gradient(135deg, #66785a 0%, #4a5b3e 100%);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #7a8f6a 0%, #5a6e4a 100%);
        }
        
        .form-container {
            background: rgba(46, 64, 43, 0.9);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffd966;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #8baa72;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
        
        select option {
            background: #2c3e2f;
        }
        
        button {
            background: #ffd966;
            color: #2c3e2f;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #ffed99;
            transform: scale(1.05);
        }
        
        .orders-table {
            background: rgba(46, 64, 43, 0.9);
            border-radius: 15px;
            overflow-x: auto;
            padding: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #8baa72;
        }
        
        th {
            background: rgba(139, 170, 114, 0.3);
            color: #ffd966;
        }
        
        td {
            color: #d4e6c3;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-PENDING { background: #ffc107; color: #000; }
        .status-PROCESSING { background: #17a2b8; color: #fff; }
        .status-COMPLETED { background: #28a745; color: #fff; }
        .status-CANCELLED { background: #dc3545; color: #fff; }
        
        .action-btn {
            padding: 5px 10px;
            margin: 0 5px;
            background: #66785a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn {
            background: #d9534f;
        }
        
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
            }
            table {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Order Management</h1>
            <p>Create, Track, and Manage Orders</p>
        </header>
        
        <div class="nav-bar">
            <a href="/" class="nav-btn">🏠 Dashboard</a>
            <a href="/users" class="nav-btn">👥 Users</a>
            <a href="/orders" class="nav-btn">📦 Orders</a>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="form-container">
            <h2 style="color: #ffd966; margin-bottom: 20px;">Create New Order</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>User ID:</label>
                    <input type="number" id="userId" required placeholder="Enter existing User ID">
                </div>
                <div class="form-group">
                    <label>Product Name:</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Quantity:</label>
                    <input type="number" id="quantity" required min="1">
                </div>
                <div class="form-group">
                    <label>Total Price:</label>
                    <input type="number" id="totalPrice" required step="0.01" min="0">
                </div>
                <button type="submit">Create Order</button>
            </form>
        </div>
        
        <div class="orders-table">
            <h2 style="color: #ffd966; margin-bottom: 20px;">Orders List</h2>
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User ID</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Total Price</th>
                        <th>Status</th>
                        <th>Order Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        async function loadOrders() {
            try {
                const response = await fetch('/api/gateway/orders');
                const orders = await response.json();
                const tbody = document.getElementById('ordersBody');
                tbody.innerHTML = '';
                
                orders.forEach(order => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = order.id;
                    row.insertCell(1).textContent = order.userId;
                    row.insertCell(2).textContent = order.productName;
                    row.insertCell(3).textContent = order.quantity;
                    row.insertCell(4).textContent = `$${order.totalPrice}`;
                    
                    const statusCell = row.insertCell(5);
                    const statusBadge = document.createElement('span');
                    statusBadge.className = `status-badge status-${order.status}`;
                    statusBadge.textContent = order.status;
                    statusCell.appendChild(statusBadge);
                    
                    row.insertCell(6).textContent = new Date(order.orderDate).toLocaleString();
                    
                    const actions = row.insertCell(7);
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.className = 'action-btn delete-btn';
                    deleteBtn.onclick = () => deleteOrder(order.id);
                    actions.appendChild(deleteBtn);
                });
            } catch (error) {
                showMessage('Error loading orders: ' + error.message, 'error');
            }
        }
        
        async function createOrder(orderData) {
            try {
                const response = await fetch('/api/gateway/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(orderData)
                });
                
                if (response.ok) {
                    showMessage('Order created successfully!', 'success');
                    document.getElementById('orderForm').reset();
                    loadOrders();
                } else {
                    const error = await response.text();
                    showMessage('Error creating order: ' + error, 'error');
                }
            } catch (error) {
                showMessage('Error creating order: ' + error.message, 'error');
            }
        }
        
        async function deleteOrder(orderId) {
            if (confirm('Are you sure you want to delete this order?')) {
                try {
                    const response = await fetch(`/api/gateway/orders/${orderId}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        showMessage('Order deleted successfully!', 'success');
                        loadOrders();
                    } else {
                        showMessage('Error deleting order', 'error');
                    }
                } catch (error) {
                    showMessage('Error deleting order: ' + error.message, 'error');
                }
            }
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
        
        document.getElementById('orderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const orderData = {
                userId: parseInt(document.getElementById('userId').value),
                productName: document.getElementById('productName').value,
                quantity: parseInt(document.getElementById('quantity').value),
                totalPrice: parseFloat(document.getElementById('totalPrice').value)
            };
            
            createOrder(orderData);
        });
        
        // Load orders when page loads
        loadOrders();
        
        // Refresh orders every 10 seconds
        setInterval(loadOrders, 10000);
    </script>
</body>
</html>
