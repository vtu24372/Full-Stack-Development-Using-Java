<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Student Details</title>
    <link rel="stylesheet" href="/css/dark-theme.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>👤 Student Details</h1>
        </header>
        
        <div class="student-profile" th:object="${student}">
            <div class="profile-header">
                <div class="profile-avatar">
                    <span th:text="${student.fullName.charAt(0)}">J</span>
                </div>
                <h2 th:text="${student.fullName}">John Doe</h2>
                <p class="student-id">ID: <span th:text="${student.id}">1</span></p>
            </div>
            
            <div class="profile-details">
                <div class="detail-section">
                    <h3>Personal Information</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-label">Email:</span>
                            <span class="detail-value" th:text="${student.email}">john@example.com</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Phone:</span>
                            <span class="detail-value" th:text="${student.phoneNumber ?: 'Not provided'}">+1234567890</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Date of Birth:</span>
                            <span class="detail-value" th:text="${student.dateOfBirth ?: 'Not provided'}">1995-01-01</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Address:</span>
                            <span class="detail-value" th:text="${student.address ?: 'Not provided'}">123 Main St</span>
                        </div>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>Academic Information</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <span class="detail-label">Department:</span>
                            <span class="detail-value" th:text="${student.department ?: 'Not assigned'}">Computer Science</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Semester:</span>
                            <span class="detail-value" th:text="${student.semester ?: 'Not assigned'}">3rd</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">CGPA:</span>
                            <span class="detail-value" th:text="${student.cgpa ?: 'Not calculated'}">3.5</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="profile-actions">
                <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-primary">✏️ Edit</a>
                <a href="/students/" class="btn btn-secondary">← Back to List</a>
                <a th:href="@{/students/delete/{id}(id=${student.id})}" 
                   class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this student?')">🗑️ Delete</a>
            </div>
        </div>
    </div>
    
    <script src="/js/script.js"></script>
</body>
</html>
