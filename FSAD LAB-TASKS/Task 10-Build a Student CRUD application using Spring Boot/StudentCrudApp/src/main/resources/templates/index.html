<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="/css/dark-theme.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Student Management System</h1>
            <p class="subtitle">Manage your students efficiently</p>
        </header>
        
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-icon">👥</span>
                <span class="stat-label">Total Students</span>
                <span class="stat-value" th:text="${totalStudents}">0</span>
            </div>
        </div>
        
        <div class="search-section">
            <form action="/students/search" method="get" class="search-form">
                <input type="text" name="name" placeholder="Search by name..." 
                       class="search-input" th:value="${searchTerm}">
                <button type="submit" class="btn btn-primary">Search</button>
                <a href="/students/" class="btn btn-secondary">Clear</a>
            </form>
            <a href="/students/add" class="btn btn-success add-btn">➕ Add New Student</a>
        </div>
        
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <div class="table-container">
            <table class="student-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Semester</th>
                        <th>CGPA</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.id}">1</td>
                        <td th:text="${student.fullName}">John Doe</td>
                        <td th:text="${student.email}">john@example.com</td>
                        <td th:text="${student.department}">Computer Science</td>
                        <td th:text="${student.semester}">3rd</td>
                        <td th:text="${student.cgpa}">3.5</td>
                        <td class="actions">
                            <a th:href="@{/students/view/{id}(id=${student.id})}" 
                               class="btn-view">👁️ View</a>
                            <a th:href="@{/students/edit/{id}(id=${student.id})}" 
                               class="btn-edit">✏️ Edit</a>
                            <a th:href="@{/students/delete/{id}(id=${student.id})}" 
                               class="btn-delete" 
                               onclick="return confirm('Are you sure you want to delete this student?')">🗑️ Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <footer>
            <p>&copy; 2024 Student Management System. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="/js/script.js"></script>
</body>
</html>
